services:
  firewall-api:
    build: .
    ports:
      - "8000:8000"
    volumes:
      # R18 artifacts must exist on host (gitignored)
      - ./models:/app/models:ro
      - ./data:/app/data
    environment:
      - PYTHONUNBUFFERED=1
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
